services:
  postgres:
    image: postgres:16-alpine
    container_name: rescue-locator-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: emergency_rescue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d emergency_rescue"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rescue-locator-api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GIN_MODE: release
      DATABASE_URL: postgres://user:password@postgres:5432/emergency_rescue?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_EXPIRY_HOURS: 24
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
